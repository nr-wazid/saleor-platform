services:
  api:
    image: ghcr.io/saleor/saleor:3.23
    ports:
      - 8000:8000
    restart: unless-stopped
    networks:
      - saleor-backend-tier
    stdin_open: true
    tty: true
    depends_on:
      - db
      - cache
      - jaeger
    volumes:
      # shared volume between worker and api for media
      - saleor-media:/app/media
    env_file:
      - common.env
      - backend.env
    environment:
      - DASHBOARD_URL=http://localhost:9000/
      - ALLOWED_HOSTS=localhost,127.0.0.1,api

  dashboard:
    image: ghcr.io/saleor/saleor-dashboard:3.23
    ports:
      - 9000:80
    restart: unless-stopped

  db:
    image: library/postgres:15-alpine
    ports:
      - 5432:5432
    restart: unless-stopped
    networks:
      - saleor-backend-tier
    volumes:
      - saleor-db:/var/lib/postgresql/data
      - ./replica_user.sql:/docker-entrypoint-initdb.d/replica_user.sql:ro,z
    environment:
      - POSTGRES_USER=saleor
      - POSTGRES_PASSWORD=saleor

  cache:
    image: valkey/valkey:8.1-alpine
    ports:
      - 6379:6379
    restart: unless-stopped
    networks:
      - saleor-backend-tier
    volumes:
      - saleor-cache:/data

  worker:
    image: ghcr.io/saleor/saleor:3.23
    command: celery -A saleor --app=saleor.celeryconf:app worker --loglevel=info -B
    restart: unless-stopped
    networks:
      - saleor-backend-tier
    env_file:
      - common.env
      - backend.env
    depends_on:
      - cache
      - mailpit
    volumes:
      # shared volume between worker and api for media
      - saleor-media:/app/media

  jaeger:
    image: jaegertracing/jaeger
    ports:
      - "16686:16686"
      - "4317:4317"
      - "4318:4318"
    restart: unless-stopped
    networks:
      - saleor-backend-tier
    volumes:
      - type: tmpfs
        target: /tmp

  mailpit:
    image: axllent/mailpit
    ports:
      - 1025:1025 # smtp server
      - 8025:8025 # web ui. Visit http://localhost:8025/ to check emails
    restart: unless-stopped
    networks:
      - saleor-backend-tier

  agent-db:
    image: pgvector/pgvector:pg18-trixie
    ports:
      - 5433:5432
    restart: unless-stopped
    networks:
      - saleor-backend-tier
    volumes:
      - agent-db:/var/lib/postgresql
    environment:
      POSTGRES_USER: saleor_agent
      POSTGRES_PASSWORD: saleor_agent
      POSTGRES_DB: saleor_agent

  pinchtab:
    image: pinchtab/pinchtab:latest
    ports:
      - 127.0.0.1:9867:9867
    restart: unless-stopped
    networks:
      - saleor-backend-tier
    volumes:
      - pinchtab-data:/data
    environment:
      PINCHTAB_TOKEN: "saleor-agent-token"

volumes:
  saleor-db:
    driver: local
  saleor-cache:
    driver: local
  saleor-media:
  agent-db:
    driver: local
  pinchtab-data:
    driver: local
networks:
  saleor-backend-tier:
    driver: bridge
